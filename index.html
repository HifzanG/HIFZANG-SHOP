<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY SHOP ULTRA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<div class="logo">MY SHOP</div>
<input type="text" id="search" placeholder="Search products...">
<div class="nav-right">
<button id="darkToggle" onclick="toggleDark()">
<span id="darkIcon">🌙</span>
</button>
<a href="cart.html">🛒</a>
</div>
</nav>

<section class="hero">
<video autoplay muted loop playsinline>
<source src="image/testrun1.mp4" type="video/mp4">
</video>
<div class="hero-text">
<h1>Step Into Style</h1>
<p>Premium Sportswear</p>
<button onclick="scrollProducts()">Shop Now</button>
</div>
</section>

<section class="products" id="products">
<h2>Featured Products</h2>
<div class="product-grid">

<div class="product-card" data-name="Running Shoe">
<img src="image/shoe1.png">
<h3>Running Shoe</h3>
<div class="rating">⭐⭐⭐⭐⭐</div>
<p>RM299</p>
<div class="buttons">
<button onclick="addCart('Running Shoe',299,'image/shoe1.png')">Add Cart</button>
<button onclick="addWish('Running Shoe',299,'image/shoe1.png')">❤️</button>
</div>
</div>

<div class="product-card" data-name="Sport T-Shirt">
<img src="image/tshirt1.png">
<h3>Sport T-Shirt</h3>
<div class="rating">⭐⭐⭐⭐</div>
<p>RM99</p>
<div class="buttons">
<button onclick="addCart('Sport T-Shirt',99,'image/tshirt1.png')">Add Cart</button>
<button onclick="addWish('Sport T-Shirt',99,'image/tshirt1.png')">❤️</button>
</div>
</div>

<div class="product-card" data-name="Sports Jacket">
<img src="image/jacket1.png">
<h3>Sports Jacket</h3>
<div class="rating">⭐⭐⭐⭐⭐</div>
<p>RM350</p>
<div class="buttons">
<button onclick="addCart('Sports Jacket',350,'image/jacket1.png')">Add Cart</button>
<button onclick="addWish('Sports Jacket',350,'image/jacket1.png')">❤️</button>
</div>
</div>

<div class="product-card" data-name="Syahid Hifzan (NOT FOR SALE!)">
<img src="image/syahid2.png">
<h3>Syahid Hifzan (NOT FOR SALE!!)</h3>
<div class="rating">⭐⭐⭐⭐⭐</div>
<p>RM100000</p>
<div class="buttons">
<button onclick="addCart('Syahid Hifzan (NOT FOR SALE!)',100000,'image/syahid2.png')">Add Cart</button>
<button onclick="addWish('Syahid Hifzan (NOT FOR SALE!)',100000,'image/syahid2.png')">❤️</button>
</div>
</div>

</div>
</section>

<section class="slider">
<h2>Trending Products</h2>
<div class="slider-container">
<div class="slide"><img src="image/shoe1.png"><p>Running Shoe</p></div>
<div class="slide"><img src="image/tshirt1.png"><p>Sport T-Shirt</p></div>
<div class="slide"><img src="image/jacket1.png"><p>Sports Jacket</p></div>
</div>
</section>

<div class="floating-cart" onclick="goCart()">🛒</div>
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
